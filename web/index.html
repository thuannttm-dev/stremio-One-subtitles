<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Double Subtitles</title>
        <link rel="stylesheet" href="/assets/styles.css" />
        <script defer src="/assets/config.js"></script>
    </head>
    <body>
        <main class="shell">
            <section class="panel">
                <a
                    class="github-link"
                    href="https://github.com/awerks/stremio-double-subtitles"
                    target="_blank"
                    rel="noreferrer"
                    aria-label="View on GitHub"
                    title="View on GitHub"
                >
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                        <path
                            d="M12 2C6.48 2 2 6.58 2 12.25c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.5v-1.9c-2.78.62-3.37-1.22-3.37-1.22-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.89c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.64 1.03 2.76 0 3.94-2.34 4.81-4.57 5.07.36.32.68.94.68 1.9v2.81c0 .28.18.6.69.5A10.08 10.08 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"
                        />
                    </svg>
                </a>
                <header>
                    <p class="eyebrow">Stremio subtitle addon</p>
                    <h1>Double Subtitles</h1>
                    <p class="summary">
                        Choose a subtitle source language, translate it into your target language, then install the
                        configured addon in Stremio.
                    </p>
                </header>

                <form id="configForm" class="config-form">
                    <label>
                        <span>Source subtitles</span>
                        <select id="sourceLang" name="sourceLang">
                            {{sourceOptions}}
                        </select>
                    </label>
                    <label>
                        <span>Translate to</span>
                        <select id="targetLang" name="targetLang">
                            {{targetOptions}}
                        </select>
                    </label>
                    <button type="submit">Install configured addon</button>
                </form>
                <p class="install-note">
                    Stremio Web: copy the manifest URL, open the addons screen, and add it as an addon repository URL.
                </p>
                <div class="manifest">
                    <span>Manifest URL</span>
                    <div class="manifest-row">
                        <a id="manifestLink" href="#"></a>
                        <button id="copyManifest" class="copy-button" type="button">Copy</button>
                    </div>
                    <span id="copyStatus" class="copy-status" role="status" aria-live="polite"></span>
                </div>
            </section>
        </main>
    </body>
</html>
